<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Setup Guide - UX Audit Screenshot Tool</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono&family=Fraunces:opsz,wght@9..144,400;9..144,500&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-body: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-display: 'Fraunces', Georgia, serif;
      --font-mono: 'DM Mono', monospace;
      --bg: #f4f2ef;
      --bg-card: #ffffff;
      --border: #e4e0db;
      --border-light: #ebe8e4;
      --text: #1a1816;
      --text-secondary: #7a7267;
      --text-muted: #a39e96;
      --accent: #3366e6;
      --accent-hover: #2952c4;
      --accent-light: #e8eeff;
      --green: #1a8754;
      --green-light: #e8f5ee;
      --amber: #c47f17;
      --amber-light: #fef7e6;
      --red: #d63031;
      --red-light: #fde8e8;
      --radius: 10px;
      --radius-lg: 16px;
      --radius-xl: 20px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .header h1 {
      font-family: var(--font-display);
      font-size: 17px;
      font-weight: 500;
    }
    .header a {
      color: var(--accent);
      font-size: 13px;
      text-decoration: none;
    }
    .header a:hover { text-decoration: underline; }

    /* Container */
    .container {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 32px 20px;
      overflow-y: auto;
    }

    /* Card */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-xl);
      width: 100%;
      max-width: 520px;
      max-height: calc(100vh - 120px);
      overflow-y: auto;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
      animation: cardIn 0.35s ease;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-top {
      padding: 28px 32px 0;
    }

    /* Progress */
    .progress {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .progress-bar {
      flex: 1;
      height: 4px;
      background: #ebe8e4;
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.4s ease;
    }
    .progress-text {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      white-space: nowrap;
    }

    /* Phase label */
    .phase-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
      margin-bottom: 6px;
    }

    /* Step title */
    .step-title {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 500;
      margin-bottom: 20px;
      line-height: 1.3;
    }

    /* Content */
    .card-body {
      padding: 0 32px;
    }
    .card-body p {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.7;
      margin-bottom: 12px;
    }
    .card-body ol {
      padding-left: 20px;
      margin-bottom: 14px;
    }
    .card-body li {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.7;
      margin-bottom: 6px;
    }
    .card-body strong {
      color: var(--text);
      font-weight: 600;
    }

    code {
      font-family: var(--font-mono);
      font-size: 12.5px;
      background: #f0eeeb;
      padding: 2px 8px;
      border-radius: 5px;
      color: #b44600;
      white-space: nowrap;
    }

    .cmd-block {
      background: #1e1e1e;
      color: #e0e0e0;
      font-family: var(--font-mono);
      font-size: 14px;
      padding: 14px 18px;
      border-radius: var(--radius);
      margin: 12px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .cmd-text {
      user-select: all;
    }
    .copy-btn {
      background: #333;
      color: #aaa;
      border: 1px solid #555;
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 12px;
      font-family: var(--font-body);
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .copy-btn:hover { color: #fff; border-color: #888; }

    .callout {
      padding: 12px 16px;
      border-radius: 0 var(--radius) var(--radius) 0;
      margin: 14px 0;
      font-size: 13px;
      line-height: 1.6;
    }
    .callout--tip {
      background: var(--amber-light);
      border-left: 3px solid var(--amber);
      color: #7a5a00;
    }
    .callout--success {
      background: var(--green-light);
      border-left: 3px solid var(--green);
      color: #0d5c36;
    }
    .callout--warn {
      background: var(--red-light);
      border-left: 3px solid var(--red);
      color: #a02020;
    }
    .callout--info {
      background: var(--accent-light);
      border-left: 3px solid var(--accent);
      color: #1a3a8a;
    }

    .download-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: var(--accent);
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      margin: 8px 0;
      transition: background 0.15s;
    }
    .download-btn:hover { background: var(--accent-hover); }

    /* Footer with buttons */
    .card-footer {
      padding: 20px 32px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .btn-done {
      padding: 12px 28px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 600;
      font-family: var(--font-body);
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      margin-left: auto;
    }
    .btn-done:hover { background: var(--accent-hover); }
    .btn-done:active { transform: scale(0.97); }

    .btn-back {
      padding: 12px 20px;
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      font-family: var(--font-body);
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-back:hover { color: var(--text-secondary); border-color: var(--text-muted); }

    .btn-skip {
      padding: 12px 16px;
      background: transparent;
      color: var(--text-muted);
      border: none;
      font-size: 13px;
      font-family: var(--font-body);
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .btn-skip:hover { color: var(--text-secondary); }

    /* OS picker (special first card) */
    .os-options-row {
      display: flex;
      gap: 12px;
    }
    .os-option {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px;
      border: 2px solid var(--border-light);
      border-radius: var(--radius-lg);
      cursor: pointer;
      transition: all 0.15s;
    }
    .os-option:hover { border-color: var(--accent); background: var(--accent-light); }
    .os-option.selected { border-color: var(--accent); background: var(--accent-light); }
    .os-icon {
      font-size: 26px;
      flex-shrink: 0;
    }
    .os-label {
      font-weight: 600;
      font-size: 15px;
    }
    .os-desc {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    /* Final card */
    .final-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--green-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin: 0 auto 16px;
    }
    .final-title {
      text-align: center;
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 500;
      margin-bottom: 12px;
    }
    .final-text {
      text-align: center;
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.7;
      margin-bottom: 10px;
    }
    .final-url {
      display: block;
      text-align: center;
      font-family: var(--font-mono);
      font-size: 18px;
      font-weight: 600;
      color: var(--accent);
      margin: 16px 0;
    }
    .btn-open {
      display: block;
      width: 100%;
      padding: 14px;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 600;
      font-family: var(--font-body);
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: background 0.15s;
    }
    .btn-open:hover { background: #15713f; }

    /* Container inner for card */
    .container-inner {
      width: 100%;
      max-width: 520px;
    }

    /* FABs */
    .fab-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
      z-index: 100;
    }
    .fab {
      height: 42px;
      padding: 0 16px;
      border-radius: 21px;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
      font-family: var(--font-body);
      font-size: 12.5px;
      font-weight: 600;
      white-space: nowrap;
    }
    .fab:hover { transform: scale(1.08); box-shadow: 0 8px 28px rgba(0,0,0,0.14); }
    .fab:active { transform: scale(0.96); }

    .fab--help {
      background: var(--bg-card);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    .fab--help:hover { color: var(--accent); border-color: var(--accent); }
    .fab--help.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    .fab--feedback {
      background: var(--accent);
      color: #fff;
    }
    .fab--feedback:hover { background: var(--accent-hover); }
    .fab--feedback.active { background: var(--accent-hover); }

    /* Floating panels */
    .float-panel {
      position: fixed;
      bottom: 130px;
      right: 24px;
      width: 380px;
      max-height: calc(100vh - 160px);
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      z-index: 99;
      display: flex;
      flex-direction: column;
      opacity: 0;
      transform: translateY(12px) scale(0.96);
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }
    .float-panel.open {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }
    .float-panel-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-light);
      flex-shrink: 0;
    }
    .float-panel-header h3 {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 400;
      flex: 1;
    }
    .float-panel-close {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .float-panel-close:hover { color: var(--text); background: #f5f3f0; }
    .float-panel-body {
      padding: 16px 20px;
      overflow-y: auto;
      flex: 1;
    }

    /* Help FAQ in panel */
    .help-faq-list { display: flex; flex-direction: column; gap: 6px; }
    .help-faq-item {
      border: 1px solid var(--border-light);
      border-radius: 6px;
      overflow: hidden;
    }
    .help-faq-item summary {
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      list-style: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: background 0.15s;
    }
    .help-faq-item summary:hover { background: #f9f8f6; }
    .help-faq-item summary::after {
      content: '\25BC';
      font-size: 10px;
      color: var(--text-muted);
      transition: transform 0.2s;
    }
    .help-faq-item[open] summary::after { transform: rotate(180deg); }
    .help-faq-item summary::-webkit-details-marker { display: none; }
    .help-faq-item p {
      padding: 0 14px 12px;
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    @media (max-width: 768px) {
      .fab-container { bottom: 16px; right: 16px; }
      .float-panel { right: 12px; left: 12px; width: auto; }
    }

    /* FAQ / Troubleshooting */
    .faq-section {
      margin-top: 24px;
    }
    .faq-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 12px;
    }
    .faq-item {
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      margin-bottom: 8px;
      overflow: hidden;
    }
    .faq-q {
      padding: 12px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      background: var(--bg);
      user-select: none;
      transition: background 0.15s;
    }
    .faq-q:hover { background: #ece9e5; }
    .faq-arrow {
      font-size: 12px;
      color: var(--text-muted);
      transition: transform 0.2s;
      flex-shrink: 0;
    }
    .faq-item.open .faq-arrow { transform: rotate(180deg); }
    .faq-a {
      display: none;
      padding: 0 16px 14px;
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.65;
      background: var(--bg-card);
      border-top: 1px solid var(--border-light);
    }
    .faq-item.open .faq-a { display: block; padding-top: 12px; }

    /* Feedback form */
    .sg-feedback-form {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 4px 0;
    }
    .sg-fb-input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      font-family: var(--font-body);
      outline: none;
      transition: border-color 0.15s;
      resize: vertical;
    }
    .sg-fb-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(51, 102, 230, 0.1);
    }
    .sg-fb-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .sg-fb-hint {
      font-size: 12px;
      color: var(--text-muted);
    }
    .sg-fb-submit {
      padding: 8px 20px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      font-family: var(--font-body);
      cursor: pointer;
      transition: background 0.15s;
    }
    .sg-fb-submit:hover { background: #2952c4; }
    .sg-fb-success {
      padding: 10px 14px;
      background: #e8f5ee;
      color: #1a8754;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      text-align: center;
      margin-top: 4px;
    }

    /* Hidden */
    .step-card { display: none; }
    .step-card.active { display: block; }
  </style>
</head>
<body>
  <div class="header">
    <h1>UX Audit Screenshot Tool</h1>
    <span style="font-size: 13px; color: var(--text-muted);">Setup Guide</span>
  </div>

  <div class="container">
    <div class="container-inner">
      <div class="card">
        <div id="card-content"></div>
      </div>
    </div>
  </div>

  <!-- FABs -->
  <div class="fab-container" id="fab-container">
    <button type="button" class="fab fab--help" id="fab-help">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      <span>Need help?</span>
    </button>
    <button type="button" class="fab fab--feedback" id="fab-feedback">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      <span>Feedback</span>
    </button>
  </div>

  <!-- Help floating panel -->
  <div class="float-panel float-panel--help" id="float-help">
    <div class="float-panel-header">
      <h3>Need help?</h3>
      <button type="button" class="float-panel-close" id="float-help-close">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="float-panel-body" id="help-panel-body"></div>
  </div>

  <!-- Feedback floating panel -->
  <div class="float-panel float-panel--feedback" id="float-feedback">
    <div class="float-panel-header">
      <h3>Feedback</h3>
      <button type="button" class="float-panel-close" id="float-feedback-close">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="float-panel-body">
      <form class="sg-feedback-form" id="sg-feedback-form">
        <input type="text" id="sg-fb-name" placeholder="Your name (optional)" class="sg-fb-input">
        <select id="sg-fb-type" class="sg-fb-input">
          <option value="setup">Setup issue</option>
          <option value="bug">Bug</option>
          <option value="suggestion">Suggestion</option>
          <option value="question">Question</option>
        </select>
        <textarea id="sg-fb-message" placeholder="Describe the issue or suggestion..." rows="3" class="sg-fb-input" required></textarea>
        <div class="sg-fb-footer">
          <span class="sg-fb-hint">We'll look into it.</span>
          <button type="submit" class="sg-fb-submit">Submit</button>
        </div>
      </form>
      <div id="sg-fb-success" class="sg-fb-success" style="display:none;">Thanks! Your feedback has been submitted.</div>
    </div>
  </div>
    </div>
  </div>

  <script>
    let os = null;
    let currentStep = 0;

    const macSteps = [
      {
        phase: 'Part 1: Install Node.js',
        title: 'First, let\'s check if Node.js is on your Mac',
        body: `
          <ol>
            <li>Press <strong>Command + Space</strong> on your keyboard. A search bar will appear.</li>
            <li>Type <strong>Terminal</strong> and press <strong>Enter</strong>. A window with a blinking cursor will open.</li>
            <li>Copy and paste this command, then press <strong>Enter</strong>:</li>
          </ol>
          <div class="cmd-block">
            <span class="cmd-text">node -v</span>
            <button class="copy-btn" onclick="copyText(this, 'node -v')">Copy</button>
          </div>
          <div class="callout callout--success">See something like <code>v20.18.0</code>? Great, Node.js is installed. Click <strong>"Already installed, skip"</strong> below.</div>
          <div class="callout callout--warn">See <code>command not found</code>? No worries. Click <strong>"I'm done"</strong> to install it in the next step.</div>
        `,
        doneLabel: "I'm done",
        skipLabel: "Already installed, skip",
        skipTo: 2,
      },
      {
        phase: 'Part 1: Install Node.js',
        title: 'Install Node.js',
        body: `
          <ol>
            <li>Click the button below. It will open the Node.js website.</li>
            <li>Click the big green <strong>"Download Node.js (LTS)"</strong> button on that page.</li>
            <li>A <code>.pkg</code> file will download. Open it.</li>
            <li>Click <strong>Continue</strong> through all the screens until it says <strong>"The installation was successful."</strong></li>
            <li><strong>Close Terminal</strong> (the window from the last step) and open it again: press <strong>Command + Space</strong>, type <strong>Terminal</strong>, press Enter.</li>
            <li>Type <code>node -v</code> and press Enter. You should now see a version number.</li>
          </ol>
          <a class="download-btn" href="https://nodejs.org/" target="_blank" rel="noopener">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Open nodejs.org
          </a>
        `,
        doneLabel: "Installed! Next",
      },
      {
        phase: 'Part 2: Download the tool',
        title: 'Download the project files',
        body: `
          <p>Click the button below to download the project as a zip file.</p>
          <a class="download-btn" href="https://github.com/eenss/ux-audit-tool/archive/refs/heads/main.zip" target="_blank" rel="noopener">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Download ux-audit-tool.zip
          </a>
          <ol>
            <li>After downloading, find the zip file in your <strong>Downloads</strong> folder.</li>
            <li><strong>Double-click</strong> the zip file to unzip it.</li>
            <li>You should see a folder called <strong>ux-audit-tool-main</strong>.</li>
          </ol>
          <div class="callout callout--tip">Save it somewhere easy to find, like your <strong>Desktop</strong> or <strong>Downloads</strong> folder.</div>
        `,
        doneLabel: "Downloaded and unzipped!",
      },
      {
        phase: 'Part 2: Download the tool',
        title: 'Open Terminal in the project folder',
        body: `
          <p>Now we need to tell Terminal where the project is. Here's the easiest way:</p>
          <ol>
            <li>Open <strong>Terminal</strong> if it's not already open (Command + Space, type Terminal, Enter).</li>
            <li>Type the letters <code>cd</code> followed by one space. <strong>Don't press Enter yet!</strong></li>
            <li>Open <strong>Finder</strong> and find the <strong>ux-audit-tool-main</strong> folder.</li>
            <li><strong>Drag the folder</strong> from Finder into the Terminal window. A path like <code>/Users/you/Desktop/ux-audit-tool-main</code> will appear automatically.</li>
            <li>Now press <strong>Enter</strong>.</li>
          </ol>
          <div class="callout callout--info">Nothing visible will happen. That's normal! It just means Terminal is now looking at the right folder.</div>
        `,
        doneLabel: "Done!",
      },
      {
        phase: 'Part 3: Set up and start',
        title: 'Run the setup',
        body: `
          <p>In the same Terminal window, copy and paste this command, then press <strong>Enter</strong>:</p>
          <div class="cmd-block">
            <span class="cmd-text">bash setup.sh</span>
            <button class="copy-btn" onclick="copyText(this, 'bash setup.sh')">Copy</button>
          </div>
          <p>You'll see some text scrolling. This is normal. <strong>Wait until you see "Setup complete!"</strong></p>
          <p>This usually takes 2-3 minutes.</p>
          <div class="callout callout--tip">If you see "permission denied", paste this first and press Enter:<br><code>chmod +x setup.sh</code><br>Then try <code>bash setup.sh</code> again.</div>
        `,
        doneLabel: 'I see "Setup complete!"',
      },
      {
        phase: 'Part 3: Set up and start',
        title: 'Start the tool!',
        body: `
          <p>Almost there! In the same Terminal window, paste this command:</p>
          <div class="cmd-block">
            <span class="cmd-text">bash start.sh</span>
            <button class="copy-btn" onclick="copyText(this, 'bash start.sh')">Copy</button>
          </div>
          <p>You should see: <code>UX Audit Tool running at http://localhost:3200</code></p>
          <div class="callout callout--info"><strong>Keep Terminal open!</strong> Closing it will stop the tool. You can minimize it.</div>
        `,
        doneLabel: "It's running!",
      },
    ];

    const winSteps = [
      {
        phase: 'Part 1: Install Node.js',
        title: 'First, let\'s check if Node.js is on your PC',
        body: `
          <ol>
            <li>Press the <strong>Windows key</strong> on your keyboard (the key with the Windows logo).</li>
            <li>Type <strong>PowerShell</strong> and click on <strong>Windows PowerShell</strong>.</li>
            <li>A blue window will open. Copy and paste this command, then press <strong>Enter</strong>:</li>
          </ol>
          <div class="cmd-block">
            <span class="cmd-text">node -v</span>
            <button class="copy-btn" onclick="copyText(this, 'node -v')">Copy</button>
          </div>
          <div class="callout callout--success">See something like <code>v20.18.0</code>? Great, Node.js is installed. Click <strong>"Already installed, skip"</strong> below.</div>
          <div class="callout callout--warn">See a red error? No worries. Click <strong>"I'm done"</strong> to install it in the next step.</div>
        `,
        doneLabel: "I'm done",
        skipLabel: "Already installed, skip",
        skipTo: 2,
      },
      {
        phase: 'Part 1: Install Node.js',
        title: 'Install Node.js',
        body: `
          <ol>
            <li>Click the button below. It will open the Node.js website.</li>
            <li>Click the big green <strong>"Download Node.js (LTS)"</strong> button.</li>
            <li>A <code>.msi</code> file will download. Open it.</li>
            <li>Click <strong>Next</strong> on every screen. <strong>Don't change any settings.</strong> Just click Next, Next, Install, Finish.</li>
            <li><strong>Close PowerShell</strong> and open it again (Windows key, type PowerShell, click it).</li>
            <li>Type <code>node -v</code> and press Enter. You should now see a version number.</li>
          </ol>
          <a class="download-btn" href="https://nodejs.org/" target="_blank" rel="noopener">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Open nodejs.org
          </a>
        `,
        doneLabel: "Installed! Next",
      },
      {
        phase: 'Part 2: Download the tool',
        title: 'Download the project files',
        body: `
          <p>Click the button below to download the project as a zip file.</p>
          <a class="download-btn" href="https://github.com/eenss/ux-audit-tool/archive/refs/heads/main.zip" target="_blank" rel="noopener">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Download ux-audit-tool.zip
          </a>
          <ol>
            <li>Find the zip file in your <strong>Downloads</strong> folder.</li>
            <li>Right-click the zip file and select <strong>"Extract All..."</strong></li>
            <li>Choose where to save it (Desktop is fine) and click <strong>Extract</strong>.</li>
          </ol>
          <p>You should see a folder called <strong>ux-audit-tool-main</strong>.</p>
        `,
        doneLabel: "Downloaded and extracted!",
      },
      {
        phase: 'Part 3: Set up and start',
        title: 'Run the setup',
        body: `
          <ol>
            <li>Open the <strong>ux-audit-tool-main</strong> folder.</li>
            <li>Find the file called <strong>setup.bat</strong></li>
            <li><strong>Double-click</strong> it.</li>
            <li>A black window will open and start installing things. <strong>Wait until you see "Setup complete!"</strong></li>
            <li>Press any key to close the window.</li>
          </ol>
          <p>This usually takes 2-3 minutes.</p>
          <div class="callout callout--tip">If Windows shows a popup saying <strong>"Windows protected your PC"</strong>, click <strong>"More info"</strong>, then click <strong>"Run anyway"</strong>. This is normal.</div>
        `,
        doneLabel: 'I see "Setup complete!"',
      },
      {
        phase: 'Part 3: Set up and start',
        title: 'Start the tool!',
        body: `
          <ol>
            <li>Open the <strong>ux-audit-tool-main</strong> folder again.</li>
            <li>Find the file called <strong>start.bat</strong></li>
            <li><strong>Double-click</strong> it.</li>
          </ol>
          <p>A black window will appear. You should see: <code>UX Audit Tool running at http://localhost:3200</code></p>
          <div class="callout callout--info"><strong>Keep this window open!</strong> Closing it will stop the tool. You can minimize it.</div>
        `,
        doneLabel: "It's running!",
      },
    ];

    const faqItems = [
      {
        q: '"command not found: node" or a red error when I type node -v',
        a: 'Node.js is not installed yet, or your terminal needs to be restarted. Close the terminal window, open a new one, and try <code>node -v</code> again. If it still doesn\'t work, go back and re-install Node.js from nodejs.org.'
      },
      {
        q: '"address already in use" error when starting',
        a: 'The tool is already running somewhere. <strong>Mac:</strong> Press Ctrl+C in Terminal first. <strong>Windows:</strong> Close the old black command window. Then try starting again.'
      },
      {
        q: 'Windows SmartScreen is blocking the file',
        a: 'This is normal for downloaded scripts. Click <strong>"More info"</strong>, then click <strong>"Run anyway"</strong>. The files are safe.'
      },
      {
        q: 'How do I update to a newer version?',
        a: 'Download the latest zip file and replace the folder. If you want to keep your login sessions, copy the <strong>profiles</strong> folder from the old version to the new one.'
      },
      {
        q: 'Something else is wrong',
        a: 'Use the <strong>Send feedback</strong> form below to describe what happened. Include what you see on your screen. We\'ll help you out!'
      },
    ];

    function renderFaq() {
      return `
        <div class="faq-section">
          <div class="faq-title">Troubleshooting</div>
          ${faqItems.map((item, i) => `
            <div class="faq-item">
              <div class="faq-q" onclick="this.parentElement.classList.toggle('open')">
                <span>${item.q}</span>
                <span class="faq-arrow">&#9660;</span>
              </div>
              <div class="faq-a">${item.a}</div>
            </div>
          `).join('')}
        </div>
      `;
    }

    const finalCard = `
      <div class="card-top" style="padding-top: 36px;">
        <div class="final-icon">&#10003;</div>
        <div class="final-title">You're all set!</div>
      </div>
      <div class="card-body">
        <p class="final-text">Open your browser and go to:</p>
        <span class="final-url">http://localhost:3200</span>
        <p class="final-text" style="margin-top: 16px;">You should see the UX Audit Screenshot Tool.</p>
        <div class="callout callout--tip" style="margin-bottom: 4px;">
          <strong>Important:</strong> The tool stops when you close the terminal or restart your computer. Click <strong>"Need help?"</strong> below for restart instructions.
        </div>
      </div>
      <div class="card-footer">
        <a class="btn-open" href="http://localhost:3200">Open the screenshot tool</a>
      </div>
    `;

    function getSteps() {
      return os === 'mac' ? macSteps : winSteps;
    }

    function render() {
      const el = document.getElementById('card-content');

      // OS picker
      if (os === null) {
        el.innerHTML = `
          <div class="card-top">
            <div class="step-title">Welcome! Let's get you set up.</div>
          </div>
          <div class="card-body">
            <p>This tool captures screenshots of OTA booking flows automatically. It runs on your own computer. The setup takes about 5 minutes.</p>
            <p style="font-weight: 600; color: var(--text); margin-top: 16px; margin-bottom: 12px;">What computer are you using?</p>
            <div class="os-options-row">
              <div class="os-option" onclick="pickOS('mac')">
                <div class="os-icon">&#128187;</div>
                <div class="os-label">Mac</div>
              </div>
              <div class="os-option" onclick="pickOS('win')">
                <div class="os-icon">&#128421;</div>
                <div class="os-label">Windows</div>
              </div>
            </div>
          </div>
          <div class="card-footer" style="flex-direction: column; gap: 0;">
            <a href="http://localhost:3200" style="font-size: 13px; color: var(--text-muted); text-decoration: none; padding: 8px 0;">Already set up? Open the screenshot tool &rarr;</a>
          </div>
        `;
        return;
      }

      const steps = getSteps();

      // Final card
      if (currentStep >= steps.length) {
        el.innerHTML = finalCard;
        return;
      }

      const step = steps[currentStep];
      const total = steps.length;
      const pct = Math.round(((currentStep) / total) * 100);

      let footerHtml = '';
      if (currentStep > 0) {
        footerHtml += `<button class="btn-back" onclick="goBack()">Back</button>`;
      } else {
        footerHtml += `<button class="btn-back" onclick="resetOS()">Back</button>`;
      }
      if (step.skipLabel) {
        footerHtml += `<button class="btn-skip" onclick="skipTo(${step.skipTo})">${step.skipLabel}</button>`;
      }
      footerHtml += `<button class="btn-done" onclick="goNext()">${step.doneLabel || "I'm done"}</button>`;

      el.innerHTML = `
        <div class="card-top">
          <div class="progress">
            <div class="progress-bar"><div class="progress-fill" style="width: ${pct}%"></div></div>
            <div class="progress-text">${currentStep + 1} / ${total}</div>
          </div>
          <div class="phase-label">${step.phase}</div>
          <div class="step-title">${step.title}</div>
        </div>
        <div class="card-body">${step.body}</div>
        <div class="card-footer">${footerHtml}</div>
      `;

      // Always show FABs
      document.getElementById('fab-container').style.display = '';
      document.getElementById('help-panel-body').innerHTML = renderHelpFaq();

      // Re-trigger animation
      const card = document.querySelector('.card');
      card.style.animation = 'none';
      card.offsetHeight;
      card.style.animation = '';
    }

    function pickOS(selected) {
      os = selected;
      currentStep = 0;
      render();
    }

    function resetOS() {
      os = null;
      currentStep = 0;
      render();
    }

    function goNext() {
      currentStep++;
      render();
    }

    function goBack() {
      if (currentStep > 0) currentStep--;
      render();
    }

    function skipTo(idx) {
      currentStep = idx;
      render();
    }

    function copyText(btn, text) {
      navigator.clipboard.writeText(text);
      btn.textContent = 'Copied!';
      setTimeout(() => { btn.textContent = 'Copy'; }, 1500);
    }

    render();

    // ---- FAB panel logic ----
    const fabHelp = document.getElementById('fab-help');
    const fabFeedback = document.getElementById('fab-feedback');
    const floatHelp = document.getElementById('float-help');
    const floatFeedback = document.getElementById('float-feedback');

    function closeAllPanels() {
      floatHelp.classList.remove('open');
      floatFeedback.classList.remove('open');
      fabHelp.classList.remove('active');
      fabFeedback.classList.remove('active');
    }

    fabHelp.addEventListener('click', () => {
      const wasOpen = floatHelp.classList.contains('open');
      closeAllPanels();
      if (!wasOpen) { floatHelp.classList.add('open'); fabHelp.classList.add('active'); }
    });

    fabFeedback.addEventListener('click', () => {
      const wasOpen = floatFeedback.classList.contains('open');
      closeAllPanels();
      if (!wasOpen) { floatFeedback.classList.add('open'); fabFeedback.classList.add('active'); }
    });

    document.getElementById('float-help-close').addEventListener('click', closeAllPanels);
    document.getElementById('float-feedback-close').addEventListener('click', closeAllPanels);
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeAllPanels(); });

    function renderHelpFaq() {
      const restartItems = [
        {
          q: 'Mac: How to start the tool again',
          a: '<ol style="padding-left:18px;margin:0;"><li>Open <strong>Terminal</strong> (Command + Space, type Terminal, Enter).</li><li>Type <code>cd</code> + space, then <strong>drag the ux-audit-tool-main folder</strong> from Finder into Terminal. Press Enter.</li><li>Type <code>bash start.sh</code> and press Enter.</li><li>Open <strong>http://localhost:3200</strong> in your browser.</li></ol>'
        },
        {
          q: 'Windows: How to start the tool again',
          a: '<ol style="padding-left:18px;margin:0;"><li>Open the <strong>ux-audit-tool-main</strong> folder.</li><li>Double-click <strong>start.bat</strong>.</li><li>Open <strong>http://localhost:3200</strong> in your browser.</li></ol>'
        },
      ];
      const allItems = [...faqItems, ...restartItems];
      return `<div class="help-faq-list">${allItems.map(item => `
        <details class="help-faq-item">
          <summary>${item.q}</summary>
          <p>${item.a}</p>
        </details>`).join('')}</div>`;
    }

    // Feedback form submission
    document.getElementById('sg-feedback-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('sg-fb-name').value;
      const type = document.getElementById('sg-fb-type').value;
      const message = document.getElementById('sg-fb-message').value;
      try {
        await fetch('http://localhost:3200/api/feedback', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name: name || 'Anonymous',
            type: type,
            message: '[Setup Guide] ' + message,
          }),
        });
        document.getElementById('sg-fb-message').value = '';
        document.getElementById('sg-fb-name').value = '';
        document.getElementById('sg-fb-success').style.display = '';
        document.getElementById('sg-feedback-form').style.display = 'none';
        setTimeout(() => {
          document.getElementById('sg-fb-success').style.display = 'none';
          document.getElementById('sg-feedback-form').style.display = '';
        }, 4000);
      } catch {
        alert('Could not send feedback. Make sure the tool is running on localhost:3200.');
      }
    });
  </script>
</body>
</html>
